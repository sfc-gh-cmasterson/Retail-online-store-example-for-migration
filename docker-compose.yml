services:
  postgres:
    image: postgres:16.4-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_key}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO is an S3-compatible local-dev object store. In production, swap to
  # AWS S3, OCI Object Storage, Cloudflare R2, Backblaze B2, etc. via env vars.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medusa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-medusa_dev_password}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9101
      MINIO_CORS_ALLOW_ORIGIN: ${STORE_CORS:-http://localhost:8000}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medusa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-medusa_dev_password}
      S3_BUCKET: ${S3_BUCKET:-medusa}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set none "local/$$S3_BUCKET"
        echo "[MinIO Init] Bucket $$S3_BUCKET created (private)"
    restart: "no"

volumes:
  postgres_data:
  meili_data:
  minio_data:
