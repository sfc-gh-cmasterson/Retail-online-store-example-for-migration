services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-medusa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-medusa}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sfc-gh-cmasterson/backend:prod}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgres://${DB_USER:-medusa}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-medusa}
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: https://${PRIMARY_DOMAIN}
      ADMIN_CORS: https://${PRIMARY_DOMAIN}
      AUTH_CORS: https://${PRIMARY_DOMAIN}
      MEDUSA_BACKEND_URL: https://${PRIMARY_DOMAIN}
      MEDUSA_ADMIN_PATH: ${MEDUSA_ADMIN_PATH:-/admin}
      MEDUSA_FF_INDEX_ENGINE: "true"
      S3_FILE_URL: ${S3_FILE_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      STORE_URL: https://${PRIMARY_DOMAIN}
      SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - app-network

  storefront:
    image: ${STOREFRONT_IMAGE:-ghcr.io/sfc-gh-cmasterson/storefront:prod}
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://${PRIMARY_DOMAIN}
        NEXT_PUBLIC_BASE_URL: https://${PRIMARY_DOMAIN}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${PUBLISHABLE_KEY}
        STOREFRONT_IMAGE_HOSTS: ${STOREFRONT_IMAGE_HOSTS}
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://${PRIMARY_DOMAIN}
      NEXT_PUBLIC_BASE_URL: https://${PRIMARY_DOMAIN}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${PUBLISHABLE_KEY}
      STOREFRONT_IMAGE_HOSTS: ${STOREFRONT_IMAGE_HOSTS}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    networks:
      - app-network

  caddy:
    image: caddy:2.8-alpine
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${PRIMARY_DOMAIN}
      STAGING_DOMAIN: ${STAGING_DOMAIN}
    depends_on:
      - storefront
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

volumes:
  pg_data:
  redis_data:
  meili_data:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
